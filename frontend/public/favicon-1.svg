<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="300" height="300">
  <defs>
    <linearGradient id="termgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <!-- f( drawn as a function call — computing / math style -->
  <!-- f letter: vertical stroke + horizontal top bar + middle arm -->
  <!-- f vertical -->
  <line x1="9" y1="10" x2="9" y2="24" stroke="#AAFF45" stroke-width="2.2" stroke-linecap="round"/>
  <!-- f curve at top -->
  <path d="M9 10 Q9 7 12 7" fill="none" stroke="#AAFF45" stroke-width="2.2" stroke-linecap="round"/>
  <!-- f crossbar -->
  <line x1="6" y1="16" x2="13" y2="16" stroke="#AAFF45" stroke-width="2.2" stroke-linecap="round"/>
  <!-- opening paren -->
  <path d="M15 10 Q12 16 15 22" fill="none" stroke="#AAFF45" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- deploy arrow inside the parens — the function body -->
  <line x1="19" y1="20" x2="19" y2="13" stroke="#AAFF45" stroke-width="2" stroke-linecap="round"/>
  <polyline points="16.5,15.5 19,13 21.5,15.5" fill="none" stroke="#AAFF45" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- closing paren -->
  <path d="M23 10 Q26 16 23 22" fill="none" stroke="#AAFF45" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
