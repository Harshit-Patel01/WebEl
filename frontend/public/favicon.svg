<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="hexbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#1c1c1c"/>
    </linearGradient>
  </defs>
  <!-- Hexagon shape background -->
  <polygon points="16,1 29,8.5 29,23.5 16,31 3,23.5 3,8.5" fill="url(#hexbg)" stroke="#AAFF45" stroke-width="1.5"/>
  <!-- Inner upward-pointing arrow: deploy symbol -->
  <!-- Shaft -->
  <line x1="16" y1="22" x2="16" y2="11" stroke="#AAFF45" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polyline points="10,16 16,10 22,16" fill="none" stroke="#AAFF45" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Two dots suggesting "open" / connectivity below shaft -->
  <circle cx="12" cy="23" r="1.5" fill="#AAFF45" opacity="0.6"/>
  <circle cx="20" cy="23" r="1.5" fill="#AAFF45" opacity="0.6"/>
</svg>
